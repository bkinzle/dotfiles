[tools]
java = "openjdk-21"
maven = "3"
python = "3.14"
terraform = "1"
terragrunt = "latest"
uv = "latest"
devspace = "latest"
jq = "latest"
yq = "latest"
ruby = "3.4.5"
node = "latest"
fzf = "latest"
go = "latest"
bun = "latest"
codex = "latest"
claude = "latest"
copilot = "latest"
lazygit = "latest"
yazi = "latest"
fd = "latest"
ripgrep = "latest"
zoxide = "latest"
argocd = "latest"
k6 = "latest"
"npm:@mixedbread/mgrep" = "latest"
"github:ahmetb/kubectl-tree" = "latest"
"github:tohjustin/kube-lineage" = "latest"

# helm-unittest is a Helm plugin (not in mise's registry); install it via a
# helm-scoped postinstall hook. Idempotent; Helm 4 needs --verify=false.
[tools.helm]
version = "latest"
postinstall = "helm plugin list | grep -q unittest || helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false"

[settings]
idiomatic_version_file_enable_tools = []
experimental = true

[settings.python]
uv_venv_auto = true
