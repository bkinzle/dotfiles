# Remap prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (click to focus, resize, scroll)
set -g mouse on

# Forward terminal focus events to programs running inside tmux (e.g. Claude Code)
set -g focus-events on

# Pass OSC 8 hyperlinks through to the outer terminal (Ghostty)
set -ga terminal-features ",*:hyperlinks"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Open yazi in a temporary bottom split when pressing `Ctrl+a` followed by `y`
bind-key y split-window -v -l 85% -c "#{pane_current_path}" "yazi; tmux kill-pane"
